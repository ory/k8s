# Default values for example-idp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # -- Overrides the Docker registry globally for all images
  imageRegistry: null

# -- Number of revisions kept in history
revisionHistoryLimit: 5

image:
  # -- ORY Hydra Login Consent Node image registry
  registry: "docker.io"
  # -- ORY Hydra Login Consent Node image
  repository: oryd/hydra-login-consent-node
  tag: v26.2.0
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3000
  # -- If you do want to specify annotations, uncomment the following lines, adjust them as necessary, and remove the curly braces after 'annotations:'.
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: example-idp.localhost
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# hydraAdminUrl: ""
# hydraPublicUrl: ""
# baseUrl: ""
# mockTlsTermination: ""

# -- We usually recommend not to specify default resources and to leave this as a conscious choice for the user.
# This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi
resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# -- Set of values for the app deployment
deployment:
  # -- Array of extra Envs to be added to the deployment. K8s format expected
  # - name: FOO
  #   value: BAR
  extraEnv: []

# -- Configure pod topologySpreadConstraints.
topologySpreadConstraints: []
# - maxSkew: 1
#   topologyKey: topology.kubernetes.io/zone
#   whenUnsatisfiable: DoNotSchedule
#   labelSelector:
#     matchLabels:
#       app.kubernetes.io/name: hydra
#       app.kubernetes.io/instance: hydra

# -- Configure pod dnsConfig.
dnsConfig: {}
#   options:
#     - name: "ndots"
#       value: "1"

# -- Pod level securityContext
podSecurityContext:
  fsGroupChangePolicy: "OnRootMismatch"
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  runAsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

## -- container securityContext
securityContext:
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  privileged: false
  seLinuxOptions:
    level: "s0:c123,c456"

test:
  # -- use a busybox image from another repository
  busybox:
    registry: "docker.io"
    repository: busybox
    tag: stable
