{{- if .Values.httproute.admin.enabled -}}
{{- $fullName := include "hydra.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-admin
  {{- if .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "hydra.labels" . | nindent 4 }}
  {{- with .Values.httproute.admin.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httproute.admin.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httproute.admin.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- range .Values.httproute.admin.rules }}
    - backendRefs:
        - group: ''
          kind: Service
          name: {{ $fullName }}-admin
          port: {{ $.Values.service.admin.port }}
          weight: 1
    {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
    {{- end }}
  {{- end }}
{{- end }}